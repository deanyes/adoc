name: Deploy Docs

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g adoc-agent
      - run: adoc build
      - run: adoc deploy github-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
